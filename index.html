<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Esports</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<div id="app">

    <!-- Header -->
    <header class="header">

        <div class="profile">

            <div class="avatar">
                <i class="fa-solid fa-user"></i>
            </div>

            <div>

                <h3 id="userName">Guest</h3>

                <p>Welcome Back 👋</p>

            </div>

        </div>

        <div class="headerIcons">

            <button class="iconBtn">
                <i class="fa-regular fa-bell"></i>
            </button>

            <button class="iconBtn">
                <i class="fa-solid fa-bars"></i>
            </button>

        </div>

    </header>

    <!-- Wallet Card -->

    <section class="walletCard">

        <div>

            <span>Total Balance</span>

            <h2 id="walletBalance">
                ₹0
            </h2>

        </div>

        <button id="addMoneyBtn">

            Add Money

        </button>

    </section>

    <!-- Notice -->

    <div class="noticeBar">

        <marquee>

            🔥 Welcome to Gamer Esports • Daily Free Fire Tournament • Win Real Cash • Join Now

        </marquee>

    </div>

    <!-- Banner -->

    <section class="bannerSlider">

        <div class="banner active">

            <h2>FREE FIRE</h2>

            <p>Daily Cash Tournament</p>

        </div>

    </section>

</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
