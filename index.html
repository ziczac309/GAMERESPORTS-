<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Gamer Esports</title>

    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    >

</head>


<body>


<div id="app">


    <!-- =========================
         HEADER
    ========================== -->

    <header class="header">

        <div class="profile">

            <div class="avatar">

                <i class="fa-solid fa-user"></i>

            </div>


            <div>

                <h3 id="userName">
                    Guest
                </h3>

                <p>
                    Welcome Back 👋
                </p>

            </div>

        </div>


        <div class="headerIcons">

            <button
                class="iconBtn"
                id="notificationBtn"
                type="button"
            >

                <i class="fa-regular fa-bell"></i>

            </button>


            <button
                class="iconBtn"
                id="menuBtn"
                type="button"
            >

                <i class="fa-solid fa-bars"></i>

            </button>

        </div>

    </header>



    <!-- =========================
         WALLET
    ========================== -->

    <section class="walletCard">

        <div>

            <span>
                Total Balance
            </span>

            <h2 id="walletBalance">
                ₹0
            </h2>

        </div>


        <button
            id="addMoneyBtn"
            type="button"
        >

            Add Money

        </button>

    </section>



    <!-- =========================
         NOTICE
    ========================== -->

    <div class="noticeBar">

        <marquee>

            🔥 Welcome to Gamer Esports •
            Daily Free Fire Tournament •
            Win Real Cash •
            Join Now

        </marquee>

    </div>



    <!-- =========================
         BANNER
    ========================== -->

    <section class="bannerSlider">

        <div class="banner active">

            <h2>
                FREE FIRE
            </h2>

            <p>
                Daily Cash Tournament
            </p>

        </div>

    </section>



    <!-- =========================
         QUICK ACTIONS
    ========================== -->

    <section class="quickActions">


        <button
            class="actionCard"
            id="tournamentBtn"
            type="button"
        >

            <i class="fa-solid fa-trophy"></i>

            <span>
                Tournament
            </span>

        </button>



        <button
            class="actionCard"
            id="walletBtn"
            type="button"
        >

            <i class="fa-solid fa-wallet"></i>

            <span>
                Wallet
            </span>

        </button>



        <button
            class="actionCard"
            id="rewardBtn"
            type="button"
        >

            <i class="fa-solid fa-gift"></i>

            <span>
                Rewards
            </span>

        </button>



        <button
            class="actionCard"
            id="referBtn"
            type="button"
        >

            <i class="fa-solid fa-users"></i>

            <span>
                Refer
            </span>

        </button>


    </section>



    <!-- =========================
         FEATURED TOURNAMENT
    ========================== -->

    <section class="section">


        <div class="sectionHeader">

            <h2>
                🔥 Featured Tournament
            </h2>


            <button
                id="viewAllBtn"
                type="button"
            >

                View All

            </button>

        </div>



        <div id="featuredTournament">

            <!-- Tournament will load here -->

        </div>


    </section>



</div>



<!-- =========================
     FIREBASE
========================== -->

<script
    type="module"
    src="firebase.js"
></script>


<!-- =========================
     APP JAVASCRIPT
========================== -->

<script
    type="module"
    src="app.js"
></script>


</body>

</html>
