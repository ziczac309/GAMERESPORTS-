<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gamer Esports</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

body{
background:#0a0a0a;
font-family:Arial,Helvetica,sans-serif;
color:white;
}

.card{
background:#181818;
border:1px solid #2d2d2d;
border-radius:18px;
}

.gold{
color:#FFD54A;
}

.bottomNav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:#111;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #2a2a2a;
}

.bottomNav i{
font-size:22px;
color:white;
}

.banner{
height:170px;
border-radius:18px;
background:linear-gradient(45deg,#FFD54A,#ff9100);
display:flex;
justify-content:center;
align-items:center;
font-size:26px;
font-weight:bold;
color:black;
}

.notice{
background:#1d1d1d;
padding:10px;
border-radius:12px;
overflow:hidden;
white-space:nowrap;
}

</style>

</head>

<body>

<!-- Header -->

<div class="flex justify-between items-center p-4">

<div>

<h1 class="text-2xl font-bold gold">
Gamer Esports
</h1>

<p class="text-gray-400 text-sm">
Welcome Back
</p>

</div>

<div class="flex gap-4">

<i class="fa-solid fa-wallet text-2xl gold"></i>

<i class="fa-solid fa-bell text-2xl"></i>

</div>

</div>

<!-- Banner -->

<div class="px-4">

<div class="banner">

FREE FIRE
TOURNAMENT

</div>

</div>

<!-- Notice -->

<div class="p-4">

<div class="notice">

<marquee>

🔥 Welcome to Gamer Esports |
Daily Tournament Available |
Join Now & Win Cash Prize

</marquee>

</div>

</div>

<!-- Categories -->

<div class="grid grid-cols-4 gap-3 px-4">

<div class="card p-3 text-center">

🎯

<p class="text-xs mt-2">
Solo
</p>

</div>

<div class="card p-3 text-center">

👥

<p class="text-xs mt-2">
Duo
</p>

</div>

<div class="card p-3 text-center">

🔥

<p class="text-xs mt-2">
Squad
</p>

</div>

<div class="card p-3 text-center">

🏆

<p class="text-xs mt-2">
CS
</p>

</div>

</div>

<!-- Featured Tournament -->

<div class="p-4">

<h2 class="text-xl font-bold mb-3">

Featured Tournament

</h2>

<div class="card p-4">

<div class="flex justify-between">

<div>

<h3 class="font-bold">

FREE FIRE SQUAD

</h3>

<p class="text-gray-400">

Prize ₹5000

</p>

</div>

<div class="gold">

Entry ₹50

</div>

</div>

<button class="w-full mt-4 bg-yellow-400 text-black font-bold rounded-xl py-3">

JOIN NOW

</button>

</div>

</div>

<!-- Bottom Navigation -->

<div class="bottomNav">

<i class="fa-solid fa-house gold"></i>

<i class="fa-solid fa-trophy"></i>

<i class="fa-solid fa-wallet"></i>

<i class="fa-solid fa-gift"></i>

<i class="fa-solid fa-user"></i>

</div>

</body>

</html>
